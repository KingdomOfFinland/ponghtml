<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Engine | Pong Deluxe Ultimate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #050505; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            overflow: hidden;
            user-select: none;
        }

        #main-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* SCREENS */
        .screen { position: absolute; width: 100%; height: 100%; z-index: 100; display: none; }
        .screen.active { display: flex; }

        #menu-screen, #settings-screen, #achievements-screen, #stats-screen { 
            background: #000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: menuFade 0.3s ease-out;
        }

        @keyframes menuFade { from { opacity: 0; } to { opacity: 1; } }

        .screen-title {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px #0f0;
            margin-bottom: 30px;
            letter-spacing: 2px;
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0%, 100% { text-shadow: 0 0 20px #0f0; }
            50% { text-shadow: 0 0 30px #0f0, -2px 0 #ff00ff, 2px 0 #00ffff; }
        }

        .menu-section {
            margin: 20px 0;
            text-align: center;
        }

        .menu-label {
            font-size: 14px;
            margin-bottom: 12px;
            text-shadow: 0 0 10px #0f0;
            opacity: 0.8;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .menu-button {
            padding: 10px 20px;
            font-size: 13px;
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
            font-weight: bold;
        }

        .menu-button:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
            transform: scale(1.05);
        }

        .menu-button.active {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 25px #0f0;
        }

        .start-button {
            padding: 15px 40px;
            font-size: 18px;
            margin-top: 30px;
        }

        .nav-buttons {
            position: absolute;
            bottom: 20px;
            display: flex;
            gap: 15px;
        }

        .nav-button {
            padding: 8px 15px;
            font-size: 12px;
            background: #000;
            color: #0a0;
            border: 1px solid #0a0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.2s;
        }

        .nav-button:hover {
            background: #0a0;
            color: #000;
        }

        /* GAME SCREEN */
        #game-screen {
            position: relative;
            width: 100%;
            height: auto;
            display: none;
        }

        #game-screen.active { display: flex; flex-direction: column; }

        .game-hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
            background: #000;
            border-bottom: 1px solid #0f0;
        }

        .player-stat {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 14px;
        }

        .stat-box {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #0f0;
            padding: 6px 12px;
            border-radius: 2px;
            font-size: 13px;
        }

        .game-title {
            text-align: center;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .game-info {
            text-align: center;
            font-size: 12px;
            color: #0a0;
        }

        .canvas-container {
            position: relative;
            width: 1024px;
            height: 576px;
            margin: 0 auto;
        }

        canvas {
            border: 3px solid #0f0;
            background: #000;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.4), inset 0 0 30px rgba(0, 0, 0, 0.5);
            display: block;
            width: 100%;
            height: 100%;
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 2;
        }

        #pause-overlay, #game-over-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        #pause-overlay.active, #game-over-overlay.active { display: flex; }

        .overlay-title {
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px #0f0;
            margin-bottom: 30px;
        }

        .overlay-hint {
            font-size: 14px;
            color: #0a0;
            margin-bottom: 20px;
        }

        .game-over-stats {
            font-size: 16px;
            color: #0a0;
            margin: 20px 0;
            line-height: 1.8;
            text-align: center;
        }

        .game-over-buttons {
            margin-top: 30px;
            display: flex;
            gap: 20px;
        }

        .game-over-buttons button {
            padding: 12px 25px;
            font-size: 14px;
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            transition: all 0.2s;
        }

        .game-over-buttons button:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }

        /* STATS & ACHIEVEMENTS */
        .stat-item {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #0f0;
            padding: 12px;
            margin: 10px 0;
            border-radius: 2px;
            min-width: 250px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #0f0;
        }

        .achievement-badge {
            display: inline-block;
            background: rgba(0, 255, 0, 0.15);
            border: 2px solid #0f0;
            padding: 15px;
            margin: 10px;
            border-radius: 5px;
            text-align: center;
            min-width: 100px;
        }

        .achievement-badge.unlocked {
            background: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.5);
        }

        .achievement-badge.locked {
            opacity: 0.4;
        }

        .achievement-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .achievement-name {
            font-size: 11px;
            font-weight: bold;
        }

        /* SETTINGS */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid #0f0;
            padding: 12px;
            margin: 10px 0;
            min-width: 300px;
            border-radius: 2px;
        }

        .setting-label {
            font-size: 13px;
        }

        .setting-control {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        input[type="range"] {
            width: 100px;
        }

        .toggle-btn {
            padding: 6px 12px;
            font-size: 12px;
            background: #000;
            color: #0a0;
            border: 1px solid #0a0;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            border-radius: 2px;
        }

        .toggle-btn.on {
            background: #0f0;
            color: #000;
            border-color: #0f0;
        }

        /* RESPONSIVE */
        @media (max-width: 1024px) {
            .canvas-container { width: 100%; }
            canvas { max-width: 100%; }
        }
    </style>
</head>
<body>

<div id="main-container">
    <!-- MENU SCREEN -->
    <div id="menu-screen" class="screen active">
        <div class="screen-title">PONG DELUXE</div>
        
        <div class="menu-section">
            <div class="menu-label">GAME MODE</div>
            <div class="button-group">
                <button class="menu-button active" data-mode="vs-ai">VS AI</button>
                <button class="menu-button" data-mode="vs-player">2 PLAYER</button>
            </div>
        </div>

        <div class="menu-section">
            <div class="menu-label">DIFFICULTY</div>
            <div class="button-group">
                <button class="menu-button active" data-difficulty="easy">EASY</button>
                <button class="menu-button" data-difficulty="normal">NORMAL</button>
                <button class="menu-button" data-difficulty="hard">HARD</button>
                <button class="menu-button" data-difficulty="insane">INSANE</button>
            </div>
        </div>

        <div class="menu-section">
            <div class="menu-label">MATCH TYPE</div>
            <div class="button-group">
                <button class="menu-button active" data-matchtype="standard">FIRST TO 11</button>
                <button class="menu-button" data-matchtype="quick">FIRST TO 5</button>
                <button class="menu-button" data-matchtype="survival">SURVIVAL</button>
                <button class="menu-button" data-matchtype="endless">ENDLESS</button>
                <button class="menu-button" data-matchtype="chaos">CHAOS</button>
            </div>
        </div>

        <div class="menu-section">
            <div class="menu-label">CONTROLS</div>
            <div class="button-group">
                <button class="menu-button active" data-controls="mouse">MOUSE</button>
                <button class="menu-button" data-controls="keyboard">KEYBOARD</button>
            </div>
        </div>

        <button class="menu-button start-button" id="start-btn">[ START GAME ]</button>

        <div class="nav-buttons">
            <button class="nav-button" onclick="showStats()">STATS</button>
            <button class="nav-button" onclick="showAchievements()">ACHIEVEMENTS</button>
            <button class="nav-button" onclick="showSettings()">SETTINGS</button>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div class="game-hud">
            <div class="player-stat">
                <span id="p1-name">P1</span>
                <div class="stat-box"><span id="p1-score">0</span> PTS</div>
                <div class="stat-box"><span id="p1-boost-bar">■■■■■</span></div>
            </div>

            <div class="game-title" style="flex: 1;">
                <div id="mode-display">VS AI</div>
                <div class="game-info" id="game-info">EASY | FIRST TO 11</div>
            </div>

            <div class="player-stat" style="justify-content: flex-end;">
                <div class="stat-box"><span id="p2-boost-bar">■■■■■</span></div>
                <div class="stat-box"><span id="p2-score">0</span> PTS</div>
                <span id="p2-name">AI</span>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="game"></canvas>
            <div class="scanlines"></div>
            <div id="pause-overlay">
                <div class="overlay-title">PAUSED</div>
                <div class="overlay-hint">PRESS P TO RESUME | ESC TO MENU</div>
            </div>
            <div id="game-over-overlay">
                <div class="overlay-title" id="game-over-text">GAME OVER</div>
                <div class="game-over-stats">
                    <div id="winner-text">Winner: P1</div>
                    <div id="final-score">Score: 0 - 0</div>
                    <div id="final-stats">Rally: 0 | Speed: 0</div>
                </div>
                <div class="game-over-buttons">
                    <button onclick="returnToMenu()">MENU</button>
                    <button onclick="restartGame()">PLAY AGAIN</button>
                    <button onclick="copyScore()">SHARE</button>
                </div>
            </div>
        </div>
    </div>

    <!-- STATS SCREEN -->
    <div id="stats-screen" class="screen">
        <div class="screen-title">STATS</div>
        <div id="stats-content" style="text-align: center; overflow-y: auto; max-height: 60vh;">
        </div>
        <div class="nav-buttons">
            <button class="nav-button" onclick="showMenu()">BACK</button>
        </div>
    </div>

    <!-- ACHIEVEMENTS SCREEN -->
    <div id="achievements-screen" class="screen">
        <div class="screen-title">ACHIEVEMENTS</div>
        <div id="achievements-content" style="text-align: center; overflow-y: auto; max-height: 60vh;">
        </div>
        <div class="nav-buttons">
            <button class="nav-button" onclick="showMenu()">BACK</button>
        </div>
    </div>

    <!-- SETTINGS SCREEN -->
    <div id="settings-screen" class="screen">
        <div class="screen-title">SETTINGS</div>
        <div id="settings-content" style="text-align: center; overflow-y: auto; max-height: 60vh;">
        </div>
        <div class="nav-buttons">
            <button class="nav-button" onclick="showMenu()">BACK</button>
        </div>
    </div>
</div>

<script>
    // ===== SETTINGS & PERSISTENCE =====
    let settings = {
        volume: 0.5,
        soundEnabled: true,
        scanlines: true,
        glitchEffects: true,
        p1Color: '#0f0',
        p2Color: '#f00',
        ballColor: '#0f0',
        ballSize: 'normal',
        paddleSize: 'normal'
    };

    function loadSettings() {
        let saved = localStorage.getItem('pongSettings');
        if (saved) settings = { ...settings, ...JSON.parse(saved) };
    }

    function saveSettings() {
        localStorage.setItem('pongSettings', JSON.stringify(settings));
    }

    loadSettings();

    // ===== ACHIEVEMENTS =====
    let achievements = {
        first_win: { name: 'First Win', icon: '🎉', unlocked: false, condition: () => stats.totalWins >= 1 },
        five_rallies: { name: 'Rally Master', icon: '⚡', unlocked: false, condition: () => stats.maxRally >= 5 },
        ten_rallies: { name: 'Unstoppable', icon: '💥', unlocked: false, condition: () => stats.maxRally >= 10 },
        twenty_rallies: { name: 'Legend', icon: '👑', unlocked: false, condition: () => stats.maxRally >= 20 },
        beat_hard: { name: 'Hard Crusher', icon: '🔥', unlocked: false, condition: () => stats.hardWins >= 1 },
        beat_insane: { name: 'Impossible', icon: '💀', unlocked: false, condition: () => stats.insaneWins >= 1 },
        perfect_game: { name: 'Perfect', icon: '⭐', unlocked: false, condition: () => stats.perfectGames >= 1 },
        speed_demon: { name: 'Speed Demon', icon: '🚀', unlocked: false, condition: () => stats.maxSpeed >= 20 },
        fifty_games: { name: 'Grinder', icon: '🎮', unlocked: false, condition: () => stats.totalGames >= 50 },
        endless_100: { name: 'Endless', icon: '♾️', unlocked: false, condition: () => stats.endlessScore >= 100 }
    };

    // ===== STATS =====
    let stats = {
        totalGames: 0,
        totalWins: 0,
        totalLosses: 0,
        maxRally: 0,
        maxSpeed: 0,
        perfectGames: 0,
        hardWins: 0,
        insaneWins: 0,
        endlessScore: 0
    };

    function loadStats() {
        let saved = localStorage.getItem('pongStats');
        if (saved) stats = { ...stats, ...JSON.parse(saved) };
    }

    function saveStats() {
        localStorage.setItem('pongStats', JSON.stringify(stats));
    }

    loadStats();

    // ===== GAME STATE =====
    let gameState = {
        mode: 'vs-ai',
        difficulty: 'easy',
        controlMode: 'mouse',
        matchType: 'standard',
        isRunning: false,
        isPaused: false,
        score1: 0,
        score2: 0,
        rally: 0,
        maxRally: 0,
        maxSpeed: 0
    };

    const difficultySettings = {
        easy: { aiSpeed: 3.5, ballSpeed: 8, maxSpeed: 18, powerupChance: 0.4 },
        normal: { aiSpeed: 5, ballSpeed: 9, maxSpeed: 20, powerupChance: 0.35 },
        hard: { aiSpeed: 6.5, ballSpeed: 10, maxSpeed: 22, powerupChance: 0.3 },
        insane: { aiSpeed: 8, ballSpeed: 11, maxSpeed: 24, powerupChance: 0.25 }
    };

    const matchTypeSettings = {
        standard: { winScore: 11, ballSpeedMult: 1.0, powerupMult: 1.0 },
        quick: { winScore: 5, ballSpeedMult: 1.0, powerupMult: 1.2 },
        survival: { winScore: 11, ballSpeedMult: 1.2, powerupMult: 1.5 },
        endless: { winScore: 999, ballSpeedMult: 0.8, powerupMult: 2.0 },
        chaos: { winScore: 11, ballSpeedMult: 1.5, powerupMult: 3.0 }
    };

    // ===== AUDIO =====
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(freq, type, duration, volume = 0.1) {
        if (!settings.soundEnabled) return;
        try {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume * settings.volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    // ===== CANVAS =====
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 1024;
    canvas.height = 576;

    const GAME_WIDTH = 1024;
    const GAME_HEIGHT = 576;
    const PADDLE_WIDTH = 18;
    const PADDLE_HEIGHT = 100;

    // ===== GAME OBJECTS =====
    let balls = [];
    let p1 = { y: GAME_HEIGHT / 2 - PADDLE_HEIGHT / 2, h: PADDLE_HEIGHT, boost: 100, boostActive: false };
    let p2 = { y: GAME_HEIGHT / 2 - PADDLE_HEIGHT / 2, h: PADDLE_HEIGHT, boost: 100, boostActive: false };
    
    let shakeTime = 0;
    let particles = [];
    let powerups = [];
    let lasers = [];
    let floatingTexts = [];

    // ===== INPUT =====
    let keys = {};
    let mouseY = GAME_HEIGHT / 2;

    window.addEventListener('mousemove', (e) => {
        if (gameState.controlMode === 'mouse' && gameState.isRunning) {
            let rect = canvas.getBoundingClientRect();
            mouseY = e.clientY - rect.top;
        }
    });

    window.addEventListener('keydown', (e) => {
        keys[e.code] = true;
        if (e.code === 'KeyP' && gameState.isRunning) togglePause();
        if (e.code === 'Escape' && gameState.isRunning) returnToMenu();
        if (e.code === 'Space' && !gameState.isPaused) handleBoost('p1');
        if (e.code === 'ShiftLeft' && !gameState.isPaused && gameState.mode === 'vs-player') handleBoost('p2');
    });

    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    function handleBoost(player) {
        let p = player === 'p1' ? p1 : p2;
        if (p.boost >= 30 && !p.boostActive) {
            p.boostActive = true;
            p.boost -= 30;
            playSound(600, 'square', 0.2, 0.15);
            addFloatingText('BOOST!', player === 'p1' ? 100 : GAME_WIDTH - 100, p.y);
            setTimeout(() => { p.boostActive = false; }, 1500);
        }
    }

    // ===== GAME LOGIC =====
    function createBall() {
        let diffSettings = difficultySettings[gameState.difficulty];
        let matchSettings = matchTypeSettings[gameState.matchType];
        let speed = diffSettings.ballSpeed * matchSettings.ballSpeedMult;
        let angle = (Math.random() * Math.PI / 3) - Math.PI / 6;
        let dir = Math.random() > 0.5 ? 1 : -1;
        return {
            x: GAME_WIDTH / 2, y: GAME_HEIGHT / 2,
            dx: dir * speed * Math.cos(angle), dy: speed * Math.sin(angle),
            r: 10, trail: []
        };
    }

    function addFloatingText(txt, x, y) {
        floatingTexts.push({ txt: txt, x: x, y: y, life: 60, alpha: 1 });
    }

    function triggerShake(dur) { shakeTime = Math.max(shakeTime, dur); }

    function spawnParticles(x, y, color = "#0f0", count = 15) {
        for(let i = 0; i < count; i++) {
            particles.push({
                x: x, y: y,
                dx: (Math.random() - 0.5) * 8,
                dy: (Math.random() - 0.5) * 8,
                life: 30, color: color
            });
        }
    }

    function spawnPowerup() {
        let matchSettings = matchTypeSettings[gameState.matchType];
        let chance = difficultySettings[gameState.difficulty].powerupChance * matchSettings.powerupMult;
        if (powerups.length < 2 && Math.random() < chance) {
            const types = ['BIG', 'FAST', 'LASER', 'MULTI', 'SHIELD', 'SLOW'];
            powerups.push({
                x: 250 + Math.random() * (GAME_WIDTH - 500),
                y: 60 + Math.random() * (GAME_HEIGHT - 120),
                type: types[Math.floor(Math.random() * types.length)],
                r: 18, pulse: 0
            });
        }
    }

    // ===== UPDATE =====
    function update() {
        if (p1.boost < 100) p1.boost += 0.2;
        if (p2.boost < 100) p2.boost += 0.2;

        if (gameState.controlMode === 'mouse') {
            p1.y = Math.max(0, Math.min(GAME_HEIGHT - p1.h, mouseY - p1.h / 2));
        } else {
            if (keys['KeyW'] || keys['ArrowUp']) p1.y = Math.max(0, p1.y - 6);
            if (keys['KeyS'] || keys['ArrowDown']) p1.y = Math.min(GAME_HEIGHT - p1.h, p1.y + 6);
        }

        if (gameState.mode === 'vs-player') {
            if (keys['KeyI'] || keys['ArrowUp']) p2.y = Math.max(0, p2.y - 6);
            if (keys['KeyK'] || keys['ArrowDown']) p2.y = Math.min(GAME_HEIGHT - p2.h, p2.y + 6);
        }

        for (let bIdx = balls.length - 1; bIdx >= 0; bIdx--) {
            let ball = balls[bIdx];
            ball.trail.push({x: ball.x, y: ball.y});
            if (ball.trail.length > 15) ball.trail.shift();

            let speedMult1 = p1.boostActive && ball.dx < 0 ? 1.4 : 1.0;
            let speedMult2 = p2.boostActive && ball.dx > 0 ? 1.4 : 1.0;
            let currentSpeedMult = Math.max(speedMult1, speedMult2);

            ball.x += ball.dx * currentSpeedMult;
            ball.y += ball.dy * currentSpeedMult;

            let maxSpeed = difficultySettings[gameState.difficulty].maxSpeed;
            let speed = Math.hypot(ball.dx, ball.dy);
            if (speed > maxSpeed) {
                let scale = maxSpeed / speed;
                ball.dx *= scale;
                ball.dy *= scale;
            }
            gameState.maxSpeed = Math.max(gameState.maxSpeed, Math.hypot(ball.dx, ball.dy));

            if(ball.y - ball.r <= 0) {
                ball.y = ball.r;
                ball.dy *= -1;
                triggerShake(3);
                playSound(300, 'sine', 0.05);
            } else if (ball.y + ball.r >= GAME_HEIGHT) {
                ball.y = GAME_HEIGHT - ball.r;
                ball.dy *= -1;
                triggerShake(3);
                playSound(300, 'sine', 0.05);
            }

            if(ball.dx < 0 && ball.x - ball.r <= 15 + PADDLE_WIDTH && ball.x + ball.r >= 15) {
                if(ball.y > p1.y && ball.y < p1.y + p1.h) {
                    let hitPoint = (ball.y - (p1.y + p1.h/2)) / (p1.h/2);
                    let speed = Math.min(Math.hypot(ball.dx, ball.dy) + 0.8, maxSpeed);
                    let angle = hitPoint * (Math.PI / 3);
                    
                    ball.dx = speed * Math.cos(angle);
                    ball.dy = speed * Math.sin(angle);
                    ball.x = 15 + PADDLE_WIDTH + ball.r;

                    triggerShake(6);
                    spawnParticles(ball.x, ball.y, "#0f0");
                    playSound(450, 'triangle', 0.08);
                    spawnPowerup();
                    gameState.rally++;
                }
            }

            if(ball.dx > 0 && ball.x + ball.r >= GAME_WIDTH - 25 && ball.x - ball.r <= GAME_WIDTH - 25 + PADDLE_WIDTH) {
                if(ball.y > p2.y && ball.y < p2.y + p2.h) {
                    let hitPoint = (ball.y - (p2.y + p2.h/2)) / (p2.h/2);
                    let speed = Math.min(Math.hypot(ball.dx, ball.dy) + 0.8, maxSpeed);
                    let angle = hitPoint * (Math.PI / 3);

                    ball.dx = -speed * Math.cos(angle);
                    ball.dy = speed * Math.sin(angle);
                    ball.x = GAME_WIDTH - 25 - ball.r;

                    triggerShake(6);
                    spawnParticles(ball.x, ball.y, "#f00");
                    playSound(400, 'triangle', 0.08);
                    spawnPowerup();
                    gameState.rally++;
                }
            }

            for (let i = powerups.length - 1; i >= 0; i--) {
                let pow = powerups[i];
                let dist = Math.hypot(ball.x - pow.x, ball.y - pow.y);
                if (dist < ball.r + pow.r) {
                    playSound(800, 'square', 0.15, 0.15);
                    spawnParticles(pow.x, pow.y, "#fff", 25);

                    if (pow.type === 'BIG') {
                        if (ball.dx > 0) p1.h = 160; 
                        else p2.h = 160;
                        setTimeout(() => { p1.h = PADDLE_HEIGHT; p2.h = PADDLE_HEIGHT; }, 8000);
                    } else if (pow.type === 'FAST') {
                        ball.dx *= 1.5; ball.dy *= 1.5;
                    } else if (pow.type === 'LASER') {
                        lasers.push({ 
                            x: ball.dx > 0 ? 30 : GAME_WIDTH - 30, 
                            y: ball.dx > 0 ? p1.y + p1.h/2 : p2.y + p2.h/2, 
                            dir: ball.dx > 0 ? 1 : -1 
                        });
                    } else if (pow.type === 'MULTI') {
                        if (gameState.matchType !== 'endless') balls.push(createBall());
                    } else if (pow.type === 'SHIELD') {
                        // Shield logic
                    } else if (pow.type === 'SLOW') {
                        ball.dx *= 0.6; ball.dy *= 0.6;
                    }
                    powerups.splice(i, 1);
                }
            }

            let winScore = matchTypeSettings[gameState.matchType].winScore;

            if(ball.x < 0) {
                gameState.score2++;
                if (gameState.matchType === 'endless') gameState.score1 = gameState.rally;
                gameState.maxRally = Math.max(gameState.maxRally, gameState.rally);
                gameState.rally = 0;
                playSound(150, 'sawtooth', 0.3);
                triggerShake(18);
                spawnParticles(0, ball.y, "#f00", 40);
                balls.splice(bIdx, 1);
                if (balls.length === 0) resetBalls();
                if (gameState.score2 >= winScore) endGame();
            } else if(ball.x > GAME_WIDTH) {
                gameState.score1++;
                if (gameState.matchType === 'endless') gameState.score1 = gameState.rally;
                gameState.maxRally = Math.max(gameState.maxRally, gameState.rally);
                gameState.rally = 0;
                playSound(700, 'sine', 0.3);
                triggerShake(18);
                spawnParticles(GAME_WIDTH, ball.y, "#0f0", 40);
                balls.splice(bIdx, 1);
                if (balls.length === 0) resetBalls();
                if (gameState.score1 >= winScore) endGame();
            }
        }

        for (let i = lasers.length - 1; i >= 0; i--) {
            let l = lasers[i];
            l.x += l.dir * 16;
            if (l.dir === 1 && l.x >= GAME_WIDTH - 25) {
                if (l.y > p2.y && l.y < p2.y + p2.h) p2.h = Math.max(30, p2.h - 30);
                lasers.splice(i, 1);
            } else if (l.dir === -1 && l.x <= 25) {
                if (l.y > p1.y && l.y < p1.y + p1.h) p1.h = Math.max(30, p1.h - 30);
                lasers.splice(i, 1);
            }
        }

        for(let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.dx; p.y += p.dy;
            p.life--;
            if(p.life <= 0) particles.splice(i, 1);
        }

        for(let i = floatingTexts.length - 1; i >= 0; i--) {
            let ft = floatingTexts[i];
            ft.y -= 1.5; ft.life--; ft.alpha = ft.life / 60;
            if(ft.life <= 0) floatingTexts.splice(i, 1);
        }

        if (gameState.mode === 'vs-ai' && balls.length > 0) {
            let primaryBall = balls[0];
            let aiSpeed = difficultySettings[gameState.difficulty].aiSpeed;
            let aiLead = gameState.difficulty === 'insane' ? 25 : gameState.difficulty === 'hard' ? 15 : 10;
            if (p2.y + p2.h/2 < primaryBall.y - aiLead) p2.y += aiSpeed;
            else if (p2.y + p2.h/2 > primaryBall.y + aiLead) p2.y -= aiSpeed;
            p2.y = Math.max(0, Math.min(GAME_HEIGHT - p2.h, p2.y));
        }

        document.getElementById('p1-score').innerText = gameState.score1;
        document.getElementById('p2-score').innerText = gameState.score2;

        let p1Bar = Math.ceil((p1.boost / 100) * 5);
        let p2Bar = Math.ceil((p2.boost / 100) * 5);
        document.getElementById('p1-boost-bar').innerText = '■'.repeat(p1Bar) + '□'.repeat(5 - p1Bar);
        document.getElementById('p2-boost-bar').innerText = '■'.repeat(p2Bar) + '□'.repeat(5 - p2Bar);
    }

    // ===== DRAW =====
    function draw() {
        ctx.save();
        if (shakeTime > 0) {
            let dx = (Math.random() - 0.5) * shakeTime;
            let dy = (Math.random() - 0.5) * shakeTime;
            ctx.translate(dx, dy);
            shakeTime--;
        }

        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

        ctx.strokeStyle = "rgba(0, 255, 0, 0.15)";
        ctx.setLineDash([8, 8]);
        ctx.beginPath();
        ctx.moveTo(GAME_WIDTH / 2, 0);
        ctx.lineTo(GAME_WIDTH / 2, GAME_HEIGHT);
        ctx.stroke();
        ctx.setLineDash([]);

        for (let ball of balls) {
            for (let i = 0; i < ball.trail.length; i++) {
                let t = ball.trail[i];
                ctx.fillStyle = `rgba(0, 255, 0, ${(i + 1) / ball.trail.length * 0.4})`;
                ctx.beginPath();
                ctx.arc(t.x, t.y, ball.r * ((i + 1) / ball.trail.length), 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.fillStyle = settings.ballColor;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2);
            ctx.fill();
        }

        ctx.fillStyle = p1.boostActive ? "#fff" : settings.p1Color;
        ctx.shadowColor = "rgba(0, 255, 0, 0.3)";
        ctx.shadowBlur = p1.boostActive ? 20 : 10;
        ctx.fillRect(15, p1.y, PADDLE_WIDTH, p1.h);

        ctx.fillStyle = p2.boostActive ? "#fff" : settings.p2Color;
        ctx.shadowBlur = p2.boostActive ? 20 : 10;
        ctx.fillRect(GAME_WIDTH - 25, p2.y, PADDLE_WIDTH, p2.h);
        ctx.shadowBlur = 0;

        for (let pow of powerups) {
            pow.pulse += 0.05;
            let r = pow.r + Math.sin(pow.pulse) * 4;
            ctx.strokeStyle = "#0f0";
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(pow.x, pow.y, r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.font = "bold 12px monospace";
            ctx.fillStyle = "#0f0";
            ctx.textAlign = "center";
            ctx.fillText(pow.type, pow.x, pow.y + 4);
        }

        ctx.fillStyle = "#f0f";
        for (let l of lasers) {
            ctx.shadowColor = "rgba(255, 0, 255, 0.8)";
            ctx.shadowBlur = 10;
            ctx.fillRect(l.x - 10, l.y - 3, 20, 6);
        }
        ctx.shadowBlur = 0;

        for (let p of particles) {
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / 30;
            ctx.fillRect(p.x, p.y, 4, 4);
            ctx.globalAlpha = 1;
        }

        for (let ft of floatingTexts) {
            ctx.font = "bold 16px monospace";
            ctx.fillStyle = `rgba(0, 255, 0, ${ft.alpha})`;
            ctx.textAlign = "center";
            ctx.fillText(ft.txt, ft.x, ft.y);
        }

        ctx.restore();
    }

    // ===== GAME FLOW =====
    function resetBalls() {
        setTimeout(() => { balls = [createBall()]; }, 500);
    }

    function startGame() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        showGameScreen();
        
        gameState.isRunning = true;
        gameState.score1 = 0;
        gameState.score2 = 0;
        gameState.rally = 0;
        gameState.maxRally = 0;
        gameState.maxSpeed = 0;
        
        p1.y = GAME_HEIGHT / 2 - PADDLE_HEIGHT / 2;
        p2.y = GAME_HEIGHT / 2 - PADDLE_HEIGHT / 2;
        p1.h = PADDLE_HEIGHT;
        p2.h = PADDLE_HEIGHT;
        p1.boost = 100;
        p2.boost = 100;
        balls = [createBall()];
        particles = [];
        powerups = [];
        lasers = [];
        floatingTexts = [];

        document.getElementById('p2-name').innerText = gameState.mode === 'vs-ai' ? 'AI' : 'P2';
        document.getElementById('mode-display').innerText = gameState.mode === 'vs-ai' ? 'VS AI' : '2 PLAYER';
        document.getElementById('game-info').innerText = `${gameState.difficulty.toUpperCase()} | ${gameState.matchType.toUpperCase()}`;

        loop();
    }

    function togglePause() {
        gameState.isPaused = !gameState.isPaused;
        document.getElementById('pause-overlay').classList.toggle('active');
    }

    function endGame() {
        gameState.isRunning = false;
        stats.totalGames++;
        
        if (gameState.score1 > gameState.score2) {
            stats.totalWins++;
            if (gameState.difficulty === 'hard') stats.hardWins++;
            if (gameState.difficulty === 'insane') stats.insaneWins++;
            if (gameState.score2 === 0) stats.perfectGames++;
        } else {
            stats.totalLosses++;
        }

        stats.maxRally = Math.max(stats.maxRally, gameState.maxRally);
        stats.maxSpeed = Math.max(stats.maxSpeed, gameState.maxSpeed);
        if (gameState.matchType === 'endless') stats.endlessScore = Math.max(stats.endlessScore, gameState.score1);

        checkAchievements();
        saveStats();

        let winner = gameState.score1 > gameState.score2 ? 'P1' : 'AI/P2';
        let winnerName = gameState.score1 > gameState.score2 ? 'P1 WINS' : (gameState.mode === 'vs-ai' ? 'AI WINS' : 'P2 WINS');

        document.getElementById('game-over-text').innerText = winnerName;
        document.getElementById('winner-text').innerText = `Winner: ${winner}`;
        document.getElementById('final-score').innerText = `Score: ${gameState.score1} - ${gameState.score2}`;
        document.getElementById('final-stats').innerText = `Rally: ${gameState.maxRally} | Speed: ${Math.round(gameState.maxSpeed * 10) / 10}`;
        document.getElementById('game-over-overlay').classList.add('active');
    }

    function copyScore() {
        let text = `P1 ${gameState.score1 > gameState.score2 ? 'WINS' : 'LOSES'} | Score: ${gameState.score1}-${gameState.score2} | Rally: ${gameState.maxRally} | Speed: ${Math.round(gameState.maxSpeed * 10) / 10} | Mode: ${gameState.mode} | Difficulty: ${gameState.difficulty}`;
        navigator.clipboard.writeText(text).then(() => alert('Score copied!')).catch(() => alert(text));
    }

    function restartGame() {
        document.getElementById('game-over-overlay').classList.remove('active');
        startGame();
    }

    function returnToMenu() {
        gameState.isRunning = false;
        gameState.isPaused = false;
        document.getElementById('game-over-overlay').classList.remove('active');
        document.getElementById('pause-overlay').classList.remove('active');
        showMenu();
        keys = {};
    }

    function loop() {
        if(gameState.isRunning && !gameState.isPaused) {
            update();
            draw();
        }
        if(gameState.isRunning) {
            requestAnimationFrame(loop);
        }
    }

    // ===== SCREEN MANAGEMENT =====
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function showMenu() { showScreen('menu-screen'); }
    function showGameScreen() { showScreen('game-screen'); }

    function showStats() {
        let html = `
            <div class="stat-item">
                <div class="stat-label">Total Games</div>
                <div class="stat-value">${stats.totalGames}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Win Rate</div>
                <div class="stat-value">${stats.totalGames > 0 ? Math.round(stats.totalWins / stats.totalGames * 100) : 0}%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Max Rally</div>
                <div class="stat-value">${stats.maxRally}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Max Speed</div>
                <div class="stat-value">${Math.round(stats.maxSpeed * 10) / 10}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Hard Wins</div>
                <div class="stat-value">${stats.hardWins}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Insane Wins</div>
                <div class="stat-value">${stats.insaneWins}</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Endless Score</div>
                <div class="stat-value">${stats.endlessScore}</div>
            </div>
        `;
        document.getElementById('stats-content').innerHTML = html;
        showScreen('stats-screen');
    }

    function showAchievements() {
        let html = '';
        for (let key in achievements) {
            let ach = achievements[key];
            html += `
                <div class="achievement-badge ${ach.unlocked ? 'unlocked' : 'locked'}">
                    <div class="achievement-icon">${ach.icon}</div>
                    <div class="achievement-name">${ach.name}</div>
                </div>
            `;
        }
        document.getElementById('achievements-content').innerHTML = html;
        showScreen('achievements-screen');
    }

    function showSettings() {
        let html = `
            <div class="setting-row">
                <div class="setting-label">Sound</div>
                <div class="setting-control">
                    <button class="toggle-btn ${settings.soundEnabled ? 'on' : ''}" onclick="toggleSetting('soundEnabled')">
                        ${settings.soundEnabled ? 'ON' : 'OFF'}
                    </button>
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-label">Volume</div>
                <div class="setting-control">
                    <input type="range" min="0" max="100" value="${settings.volume * 100}" 
                        onchange="settings.volume = this.value / 100; saveSettings();">
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-label">Scanlines</div>
                <div class="setting-control">
                    <button class="toggle-btn ${settings.scanlines ? 'on' : ''}" onclick="toggleSetting('scanlines')">
                        ${settings.scanlines ? 'ON' : 'OFF'}
                    </button>
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-label">Glitch Effects</div>
                <div class="setting-control">
                    <button class="toggle-btn ${settings.glitchEffects ? 'on' : ''}" onclick="toggleSetting('glitchEffects')">
                        ${settings.glitchEffects ? 'ON' : 'OFF'}
                    </button>
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-label">P1 Color</div>
                <div class="setting-control">
                    <input type="color" value="${settings.p1Color}" onchange="settings.p1Color = this.value; saveSettings();">
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-label">P2 Color</div>
                <div class="setting-control">
                    <input type="color" value="${settings.p2Color}" onchange="settings.p2Color = this.value; saveSettings();">
                </div>
            </div>
            <div class="setting-row">
                <div class="setting-label">Ball Color</div>
                <div class="setting-control">
                    <input type="color" value="${settings.ballColor}" onchange="settings.ballColor = this.value; saveSettings();">
                </div>
            </div>
            <div class="setting-row">
                <button class="menu-button" onclick="clearAllData()" style="width: 100%; margin-top: 20px;">CLEAR ALL DATA</button>
            </div>
        `;
        document.getElementById('settings-content').innerHTML = html;
        showScreen('settings-screen');
    }

    function toggleSetting(setting) {
        settings[setting] = !settings[setting];
        saveSettings();
        showSettings();
    }

    function clearAllData() {
        if (confirm('Are you sure? This will delete all stats and achievements.')) {
            localStorage.clear();
            stats = { totalGames: 0, totalWins: 0, totalLosses: 0, maxRally: 0, maxSpeed: 0, perfectGames: 0, hardWins: 0, insaneWins: 0, endlessScore: 0 };
            achievements = Object.fromEntries(Object.entries(achievements).map(([k, v]) => [k, { ...v, unlocked: false }]));
            saveStats();
            showSettings();
        }
    }

    function checkAchievements() {
        for (let key in achievements) {
            if (!achievements[key].unlocked && achievements[key].condition()) {
                achievements[key].unlocked = true;
                playSound(1000, 'sine', 0.3, 0.2);
            }
        }
        localStorage.setItem('pongAchievements', JSON.stringify(achievements));
    }

    // ===== MENU HANDLERS =====
    document.querySelectorAll('.menu-button[data-mode]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.menu-button[data-mode]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            gameState.mode = btn.dataset.mode;
        });
    });

    document.querySelectorAll('.menu-button[data-difficulty]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.menu-button[data-difficulty]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            gameState.difficulty = btn.dataset.difficulty;
        });
    });

    document.querySelectorAll('.menu-button[data-matchtype]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.menu-button[data-matchtype]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            gameState.matchType = btn.dataset.matchtype;
        });
    });

    document.querySelectorAll('.menu-button[data-controls]').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.menu-button[data-controls]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            gameState.controlMode = btn.dataset.controls;
        });
    });

    document.getElementById('start-btn').addEventListener('click', startGame);

    loadStats();
</script>
