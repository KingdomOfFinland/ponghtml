<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Fish Engine | Core Pong</title>
    <style>
        body { 
            background: #000; color: #0f0; font-family: monospace; 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; 
        }
        canvas { border: 2px solid #0f0; background: #000; cursor: none; }
        .stats { width: 600px; display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 20px; }
        #boot { position: absolute; background: #000; border: 2px solid #0f0; padding: 20px; cursor: pointer; z-index: 5; }
    </style>
</head>
<body>

    <div class="stats">
        <span>PLAYER: <span id="s1">0</span></span>
        <span>AI: <span id="s2">0</span></span>
    </div>

    <div style="position: relative;">
        <canvas id="game"></canvas>
        <div id="boot" onclick="start()">START GAME</div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = 600; canvas.height = 400;

        let ball = { x: 300, y: 200, dx: 4, dy: 4, r: 7 };
        let p1y = 150, p2y = 150;
        let score1 = 0, score2 = 0;
        let running = false;
        const ph = 60, pw = 10;

        function start() {
            document.getElementById('boot').style.display = 'none';
            running = true;
            resetBall();
            loop();
        }

        function resetBall() {
            ball.x = 300; ball.y = 200;
            ball.dx = (Math.random() > 0.5 ? 4 : -4);
            ball.dy = (Math.random() * 6) - 3;
        }

        window.onmousemove = (e) => {
            let rect = canvas.getBoundingClientRect();
            p1y = e.clientY - rect.top - ph/2;
        };

        function update() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Bounce top/bottom
            if(ball.y <= 0 || ball.y >= canvas.height) ball.dy *= -1;

            // Player Collision (Left)
            if(ball.dx < 0 && ball.x <= 20 + pw) {
                if(ball.y > p1y && ball.y < p1y + ph) {
                    ball.dx = Math.abs(ball.dx) + 0.2; // Speed up
                    ball.x = 21 + pw; // Push out to prevent sticking
                }
            }

            // AI Collision (Right)
            if(ball.dx > 0 && ball.x >= canvas.width - 20 - pw) {
                if(ball.y > p2y && ball.y < p2y + ph) {
                    ball.dx = -Math.abs(ball.dx) - 0.2;
                    ball.x = canvas.width - 21 - pw; // Push out
                }
            }

            // AI tracking
            if(p2y + ph/2 < ball.y) p2y += 3.5; else p2y -= 3.5;

            // Scores
            if(ball.x < 0) { score2++; resetBall(); }
            if(ball.x > canvas.width) { score1++; resetBall(); }

            document.getElementById('s1').innerText = score1;
            document.getElementById('s2').innerText = score2;
        }

        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.fillRect(10, p1y, pw, ph);
            ctx.fillRect(canvas.width - 20, p2y, pw, ph);
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); ctx.fill();
        }

        function loop() {
            if(running) {
                update();
                draw();
                requestAnimationFrame(loop);
            }
        }
    </script>
</body>
</html>
