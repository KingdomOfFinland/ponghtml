<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <title>Fish Engine | Core Pong Deluxe</title>
    <style>
        body { 
            background: #050505; color: #0f0; font-family: monospace; 
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; 
            overflow: hidden; user-select: none;
        }
        .stats { width: 1024px; display: flex; justify-between: space-between; margin-bottom: 8px; font-size: 20px; font-weight: bold; text-shadow: 0 0 8px #0f0; }
        .canvas-container { position: relative; width: 1024px; height: 576px; }
        canvas { 
            border: 2px solid #0f0; background: #000; cursor: none; 
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3); 
        }
        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 2;
        }
        #boot { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; border: 3px solid #0f0; color: #0f0; padding: 25px 40px; 
            font-size: 24px; font-family: monospace; cursor: pointer; z-index: 10;
            box-shadow: 0 0 15px #0f0; text-align: center;
        }
        #boot:hover { background: #0f0; color: #000; box-shadow: 0 0 30px #0f0; }
        .hud-hint { font-size: 12px; color: #0a0; text-align: center; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="stats">
        <span>PLAYER: <span id="s1">0</span> <span id="p1-boost" style="font-size: 14px; color: #0f0;">[BOOST READY]</span></span>
        <span>CORE PONG 576p</span>
        <span>AI: <span id="s2">0</span></span>
    </div>

    <div class="canvas-container">
        <canvas id="game"></canvas>
        <div class="scanlines"></div>
        <div id="boot" onclick="start()">[ START GAME Engine v2.0 ]</div>
    </div>
    <div class="hud-hint">CONTROLS: Mouse to move | SPACEBAR to activate Speed Boost</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = 1024; canvas.height = 576;

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration) {
            try {
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e){}
        }

        let balls = [];
        let p1y = 288, p2y = 288;
        let p1h = 100, p2h = 100;
        let p1Boost = 100, p1BoostActive = false;
        let score1 = 0, score2 = 0;
        let running = false;
        const pw = 18;

        let shakeTime = 0;
        let particles = [];
        let powerups = [];
        let lasers = [];
        let floatingTexts = [];

        function start() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('boot').style.display = 'none';
            running = true;
            resetGame();
            loop();
        }

        function resetGame() {
            balls = [createBall()];
            powerups = [];
            lasers = [];
        }

        function createBall() {
            let speed = 8;
            let angle = (Math.random() * Math.PI / 3) - Math.PI / 6;
            let dir = Math.random() > 0.5 ? 1 : -1;
            return {
                x: 512, y: 288,
                dx: dir * speed * Math.cos(angle),
                dy: speed * Math.sin(angle),
                r: 10,
                trail: []
            };
        }

        function addFloatingText(txt, x, y) {
            floatingTexts.push({ txt: txt, x: x, y: y, life: 40, alpha: 1 });
        }

        function triggerShake(dur) { shakeTime = dur; }

        function spawnParticles(x, y, color = "#0f0", count = 15) {
            for(let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    dx: (Math.random() - 0.5) * 8,
                    dy: (Math.random() - 0.5) * 8,
                    life: 25, color: color
                });
            }
        }

        function spawnPowerup() {
            if (powerups.length < 2 && Math.random() < 0.35) {
                const types = ['BIG', 'FAST', 'LASER', 'MULTI'];
                powerups.push({
                    x: 250 + Math.random() * 524,
                    y: 60 + Math.random() * 456,
                    type: types[Math.floor(Math.random() * types.length)],
                    r: 18,
                    pulse: 0
                });
            }
        }

        window.onmousemove = (e) => {
            let rect = canvas.getBoundingClientRect();
            p1y = e.clientY - rect.top - p1h/2;
        };

        window.onkeydown = (e) => {
            if (e.code === 'Space' && p1Boost >= 30 && !p1BoostActive) {
                p1BoostActive = true;
                p1Boost -= 30;
                playSound(600, 'square', 0.2);
                addFloatingText("BOOST!", 100, p1y);
                setTimeout(() => p1BoostActive = false, 1500);
            }
        };

        function update() {
            if (p1Boost < 100) p1Boost += 0.15;
            document.getElementById('p1-boost').innerText = p1Boost >= 30 ? "[BOOST READY]" : "[RECHARGING]";

            for (let bIdx = balls.length - 1; bIdx >= 0; bIdx--) {
                let ball = balls[bIdx];

                ball.trail.push({x: ball.x, y: ball.y});
                if (ball.trail.length > 10) ball.trail.shift();

                let currentSpeedMult = p1BoostActive && ball.dx < 0 ? 1.5 : 1.0;
                ball.x += ball.dx * currentSpeedMult;
                ball.y += ball.dy * currentSpeedMult;

                if(ball.y - ball.r <= 0) {
                    ball.y = ball.r;
                    ball.dy *= -1;
                    triggerShake(3);
                    playSound(300, 'sine', 0.05);
                } else if (ball.y + ball.r >= canvas.height) {
                    ball.y = canvas.height - ball.r;
                    ball.dy *= -1;
                    triggerShake(3);
                    playSound(300, 'sine', 0.05);
                }

                if(ball.dx < 0 && ball.x - ball.r <= 15 + pw && ball.x + ball.r >= 15) {
                    if(ball.y > p1y && ball.y < p1y + p1h) {
                        let hitPoint = (ball.y - (p1y + p1h/2)) / (p1h/2);
                        let speed = Math.min(Math.hypot(ball.dx, ball.dy) + 0.5, 18);
                        let angle = hitPoint * (Math.PI / 3);
                        
                        ball.dx = speed * Math.cos(angle);
                        ball.dy = speed * Math.sin(angle);
                        ball.x = 15 + pw + ball.r;

                        triggerShake(6);
                        spawnParticles(ball.x, ball.y, "#0f0");
                        playSound(450, 'triangle', 0.08);
                        spawnPowerup();
                    }
                }

                if(ball.dx > 0 && ball.x + ball.r >= canvas.width - 25 && ball.x - ball.r <= canvas.width - 25 + pw) {
                    if(ball.y > p2y && ball.y < p2y + p2h) {
                        let hitPoint = (ball.y - (p2y + p2h/2)) / (p2h/2);
                        let speed = Math.min(Math.hypot(ball.dx, ball.dy) + 0.5, 18);
                        let angle = hitPoint * (Math.PI / 3);

                        ball.dx = -speed * Math.cos(angle);
                        ball.dy = speed * Math.sin(angle);
                        ball.x = canvas.width - 25 - ball.r;

                        triggerShake(6);
                        spawnParticles(ball.x, ball.y, "#f00");
                        playSound(400, 'triangle', 0.08);
                        spawnPowerup();
                    }
                }

                for (let i = powerups.length - 1; i >= 0; i--) {
                    let pow = powerups[i];
                    let dist = Math.hypot(ball.x - pow.x, ball.y - pow.y);
                    if (dist < ball.r + pow.r) {
                        playSound(800, 'square', 0.15);
                        spawnParticles(pow.x, pow.y, "#fff", 20);

                        if (pow.type === 'BIG') {
                            if (ball.dx > 0) { p1h = 160; addFloatingText("P1 PADDLE XL", 80, p1y); } 
                            else { p2h = 160; addFloatingText("AI PADDLE XL", 800, p2y); }
                            setTimeout(() => { p1h = 100; p2h = 100; }, 8000);
                        } else if (pow.type === 'FAST') {
                            ball.dx *= 1.4; ball.dy *= 1.4;
                            addFloatingText("HYPER BALL!", pow.x, pow.y);
                        } else if (pow.type === 'LASER') {
                            lasers.push({ x: ball.dx > 0 ? 30 : canvas.width - 30, y: ball.dx > 0 ? p1y + p1h/2 : p2y + p2h/2, dir: ball.dx > 0 ? 1 : -1 });
                            addFloatingText("LASER SHOT!", pow.x, pow.y);
                        } else if (pow.type === 'MULTI') {
                            balls.push(createBall());
                            addFloatingText("MULTI-BALL!", pow.x, pow.y);
                        }
                        powerups.splice(i, 1);
                    }
                }

                if(ball.x < 0) {
                    score2++;
                    playSound(150, 'sawtooth', 0.3);
                    triggerShake(18);
                    spawnParticles(0, ball.y, "#f00", 30);
                    balls.splice(bIdx, 1);
                    if (balls.length === 0) resetGame();
                } else if(ball.x > canvas.width) {
                    score1++;
                    playSound(700, 'sine', 0.3);
                    triggerShake(18);
                    spawnParticles(canvas.width, ball.y, "#0f0", 30);
                    balls.splice(bIdx, 1);
                    if (balls.length === 0) resetGame();
                }
            }

            for (let i = lasers.length - 1; i >= 0; i--) {
                let l = lasers[i];
                l.x += l.dir * 16;
                if (l.dir === 1 && l.x >= canvas.width - 25) {
                    if (l.y > p2y && l.y < p2y + p2h) { p2h = Math.max(30, p2h - 30); addFloatingText("SHRINK!", 800, p2y); }
                    lasers.splice(i, 1);
                } else if (l.dir === -1 && l.x <= 25) {
                    if (l.y > p1y && l.y < p1y + p1h) { p1h = Math.max(30, p1h - 30); addFloatingText("SHRINK!", 80, p1y); }
                    lasers.splice(i, 1);
                }
            }

            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.dx; p.y += p.dy;
                p.life--;
                if(p.life <= 0) particles.splice(i, 1);
            }

            for(let i = floatingTexts.length - 1; i >= 0; i--) {
                let ft = floatingTexts[i];
                ft.y -= 1; ft.life--; ft.alpha = ft.life / 40;
                if(ft.life <= 0) floatingTexts.splice(i, 1);
            }

            if (balls.length > 0) {
                let primaryBall = balls[0];
                let aiSpeed = 5.0;
                if (p2y + p2h/2 < primaryBall.y - 10) p2y += aiSpeed;
                else if (p2y + p2h/2 > primaryBall.y + 10) p2y -= aiSpeed;
            }

            document.getElementById('s1').innerText = score1;
            document.getElementById('s2').innerText = score2;
        }

        function draw() {
            ctx.save();

            if (shakeTime > 0) {
                let dx = (Math.random() - 0.5) * shakeTime;
                let dy = (Math.random() - 0.5) * shakeTime;
                ctx.translate(dx, dy);
                shakeTime--;
            }

            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = "rgba(0, 255, 0, 0.15)";
            ctx.setLineDash([8, 8]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            for (let ball of balls) {
                for (let i = 0; i < ball.trail.length; i++) {
                    let t = ball.trail[i];
                    ctx.fillStyle = `rgba(0, 255, 0, ${(i + 1) / ball.trail.length * 0.35})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, ball.r * ((i + 1) / ball.trail.length), 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.fillStyle = "#0f0";
                ctx.beginPath(); 
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI*2); 
                ctx.fill();
            }

            ctx.fillStyle = p1BoostActive ? "#fff" : "#0f0";
            ctx.fillRect(15, p1y, pw, p1h);
            ctx.fillStyle = "#f00";
            ctx.fillRect(canvas.width - 25, p2y, pw, p2h);

            for (let pow of powerups) {
                pow.pulse += 0.05;
                let r = pow.r + Math.sin(pow.pulse) * 3;
                ctx.strokeStyle = "#0f0"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(pow.x, pow.y, r, 0, Math.PI * 2); ctx.stroke();
                ctx.font = "12px monospace"; ctx.fillStyle = "#0f0"; ctx.textAlign = "center";
                ctx.fillText(pow.type, pow.x, pow.y + 4);
            }

            ctx.fillStyle = "#f0f";
            for (let l of lasers) { ctx.fillRect(l.x, l.y - 3, 20, 6); }

            for (let p of particles) {
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 4, 4);
            }

            for (let ft of floatingTexts) {
                ctx.font = "14px monospace";
                ctx.fillStyle = `rgba(0, 255, 0, ${ft.alpha})`;
                ctx.fillText(ft.txt, ft.x, ft.y);
            }

            ctx.restore();
        }

        function loop() {
            if(running) {
                update();
                draw();
                requestAnimationFrame(loop);
            }
        }
    </script>
</body>
</html>
